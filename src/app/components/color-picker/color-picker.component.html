<div
    class="fs-color-picker-preview-wrapper"
    [hidden]="!value"
    [ngClass]="{ selected: value, disabled: isDisabled }">
  <fs-color-picker-chip
    [clickable]="false"
    [ngModel]="value"
    (ngModelChange)="chipChanged($event)">
  </fs-color-picker-chip>
</div>
<fs-clear
  (clear)="clear($event)"
  [show]="showClear"
  [visible]="!!value">
</fs-clear>
